name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Format
        if: runner.os == 'Linux' # formatting is platform-independent
        run: cargo fmt --all --check

      - name: Clippy (all features, warnings denied)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

  tiers:
    name: Range-tier builds (no_std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # The library is #![no_std] with no `alloc`; build the empty-table base and
      # each nested range tier to guard the per-tier `#[cfg]` gating.
      - name: Build bare (no tier features)
        run: cargo build --no-default-features

      - name: Build each tier
        run: |
          for feat in ascii latin1 bmp full; do
            echo "::group::features=$feat"
            cargo build --no-default-features --features "$feat"
            echo "::endgroup::"
          done

      # The subset-semantics tests only have active assertions under the narrow
      # tiers, so run them there explicitly.
      - name: Subset-semantics tests
        run: |
          cargo test --test subset --no-default-features --features ascii
          cargo test --test subset --no-default-features --features latin1
          cargo test --test subset --no-default-features --features bmp

  codegen:
    name: Generated tables are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # Regenerate from the vendored UCD and fail if the committed output drifts.
      - name: Regenerate and diff
        run: |
          cargo run -p codegen
          git diff --exit-code -- src/generated \
            || { echo "::error::src/generated is stale; run 'cargo run -p codegen'"; exit 1; }

  docs:
    name: Docs build (warnings denied)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings -D rustdoc::broken-intra-doc-links
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: cargo doc --no-deps --all-features
        run: cargo doc --no-deps --all-features
