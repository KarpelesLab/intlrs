name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Format
        if: runner.os == 'Linux' # formatting is platform-independent
        run: cargo fmt --all --check

      - name: Clippy (all features, warnings denied)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

  tiers:
    name: Range-tier builds (no_std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # Build on a bare-metal target with no std available, to prove there is no
      # accidental `std` leakage (with and without `alloc`).
      - name: Bare no_std target build
        run: |
          cargo build --target thumbv7em-none-eabi --no-default-features --features full
          cargo build --target thumbv7em-none-eabi --no-default-features --features alloc

      # The library is #![no_std] with no `alloc`; build the empty-table base
      # (no tier compiled in) to guard the per-tier `#[cfg]` gating.
      - name: Build bare (no tier features)
        run: cargo build --no-default-features

      # Run the integration + unit tests under each nested tier. This exercises
      # both the tier-specific property assertions and the subset-semantics
      # tests, whose active branches differ per tier. Doctests are skipped here
      # (`--tests`): they assume the default/full feature set and are validated
      # by the `test` job under `--all-features`.
      - name: Test each tier
        run: |
          for feat in ascii latin1 bmp full; do
            echo "::group::features=$feat"
            cargo test --no-default-features --features "$feat" --tests
            echo "::endgroup::"
          done

      # Report the embedded-data footprint (informational): the generated
      # Unicode tables and CLDR blobs are what drive binary size, so changes
      # should be visible in the log.
      - name: Embedded data footprint
        run: |
          echo "Unicode property tables (src/unicode/generated/*.rs):"
          du -bc src/unicode/generated/*.rs | tail -1
          echo "CLDR binary blobs (src/cldr/*.bin):"
          du -bc src/cldr/*.bin | tail -1
          echo "Per-blob:"
          du -b src/cldr/*.bin | sort -n

      # Compiled footprint per tier: build the size-probe example (which links
      # the core property tables) in release and report its section sizes. The
      # `.text`/`.rodata` growth across tiers is the real binary-size signal.
      - name: Compiled size per tier
        run: |
          printf '%-8s %8s %8s %8s\n' tier text data bss
          for feat in ascii latin1 bmp full; do
            cargo build --release --example sizeprobe --no-default-features --features "$feat" >/dev/null 2>&1
            read -r text data bss _ < <(size target/release/examples/sizeprobe | tail -1)
            printf '%-8s %8s %8s %8s\n' "$feat" "$text" "$data" "$bss"
          done

  codegen:
    name: Generated tables are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # `codegen` is a standalone packaging-time tool (its own package, not part
      # of the published crate), so lint it via its own manifest.
      - name: Lint codegen
        run: |
          cargo fmt --manifest-path codegen/Cargo.toml --check
          cargo clippy --manifest-path codegen/Cargo.toml -- -D warnings

      # Regenerate from the vendored UCD and fail if the committed output drifts.
      - name: Regenerate and diff
        run: |
          cargo run --manifest-path codegen/Cargo.toml
          git diff --exit-code -- src/unicode/generated src/cldr \
            || { echo "::error::generated tables are stale; run 'cargo run --manifest-path codegen/Cargo.toml'"; exit 1; }

  conformance:
    name: UCA collation conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # The ~40 MB CollationTest files are not committed; fetch them here so the
      # collation conformance test runs against the full official suite.
      - name: Fetch UCA CollationTest
        run: |
          curl -fsSL -o /tmp/ct.zip https://www.unicode.org/Public/17.0.0/uca/CollationTest.zip
          unzip -o /tmp/ct.zip -d data/uca/17.0.0/

      - name: Fetch LineBreakTest
        run: |
          curl -fsSL -o data/ucd/17.0.0/auxiliary/LineBreakTest.txt \
            https://www.unicode.org/Public/17.0.0/ucd/auxiliary/LineBreakTest.txt

      - name: Fetch BidiCharacterTest
        run: |
          curl -fsSL -o data/ucd/17.0.0/BidiCharacterTest.txt \
            https://www.unicode.org/Public/17.0.0/ucd/BidiCharacterTest.txt

      - name: Conformance (collation, normalization, line break, bidi)
        run: cargo test --release --all-features --test collation_conformance --test normalization_conformance --test line_conformance --test bidi_conformance

  docs:
    name: Docs build (warnings denied)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings -D rustdoc::broken-intra-doc-links
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: cargo doc --no-deps --all-features
        run: cargo doc --no-deps --all-features

  msrv:
    name: MSRV (Rust 1.70)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # The crate declares rust-version = "1.70". Build it on exactly that
      # toolchain so an accidental use of a newer-stable API fails CI rather than
      # downstream. The `iana-tz` feature is excluded: its `timezone-data`
      # dependency requires 1.86 (documented), so it is not part of the MSRV set.
      - name: Install Rust 1.70
        uses: dtolnay/rust-toolchain@1.70.0

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build across feature tiers
        run: |
          for feat in ascii latin1 bmp full alloc; do
            echo "::group::features=$feat"
            cargo build --no-default-features --features "$feat"
            echo "::endgroup::"
          done

  fuzz:
    name: Fuzz targets compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Type-check the cargo-fuzz targets (under fuzz/) so they don't bit-rot as
      # the public API evolves. This does not run the fuzzer — coverage-guided
      # fuzzing is driven locally / by OSS-Fuzz with `cargo +nightly fuzz run`.
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: cargo check the fuzz harness
        run: cargo check --manifest-path fuzz/Cargo.toml

  public-api:
    name: Public API surface guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Guard the public API: regenerate the surface and diff it against the
      # committed `public-api.txt`. A deliberate API change must update the
      # snapshot (regenerate with `cargo public-api --all-features > public-api.txt`);
      # an accidental one fails here. cargo-public-api needs nightly rustdoc.
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-public-api
        run: cargo install cargo-public-api --version 0.52.0 --locked

      - name: Public API unchanged
        run: |
          cargo public-api --all-features > /tmp/public-api.txt
          diff -u public-api.txt /tmp/public-api.txt
